<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March Madness Pool Scoreboard</title>
<style>
  :root {
    --bg: #0a2240;
    --card: #0d2d5e;
    --accent: #009cde;
    --accent2: #e04e39;
    --green: #2ecc71;
    --red: #e74c3c;
    --gold: #f5c518;
    --text: #ffffff;
    --muted: #8fadc8;
    --border: #1a4a7a;
    --header-bg: #002b5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 1.5rem 1rem 1rem;
    background: linear-gradient(180deg, #001a38, var(--header-bg));
    border-bottom: 3px solid var(--accent);
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #fff;
  }
  .header h1 span { color: var(--accent); }
  .header .subtitle { color: var(--muted); margin-top: 0.25rem; font-size: 0.9rem; }
  .header .prizes {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: var(--gold);
  }
  .update-bar {
    text-align: center;
    padding: 0.5rem;
    font-size: 0.8rem;
    color: var(--muted);
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
  }
  .update-bar .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
  .section-title {
    font-size: 1.3rem;
    margin-bottom: 0.75rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-weight: 700;
  }

  /* Standings */
  .standings { margin-bottom: 2rem; }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .standings-table th {
    background: var(--header-bg);
    padding: 0.6rem 0.75rem;
    text-align: left;
    font-size: 0.8rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .standings-table td {
    padding: 0.6rem 0.75rem;
    border-top: 1px solid var(--border);
    font-size: 0.95rem;
  }
  .standings-table tr:hover { background: rgba(0,156,222,0.08); }
  .rank { font-weight: 700; color: var(--accent); width: 40px; }
  .rank-1 { color: #ffd700; }
  .rank-2 { color: #c0c0c0; }
  .rank-3 { color: #cd7f32; }
  .player-name { font-weight: 600; }
  .score { font-weight: 700; font-size: 1.1rem; color: var(--green); }
  .teams-alive { color: var(--muted); font-size: 0.85rem; }
  .money { color: var(--gold); font-weight: 600; }

  /* Today's Games - Tile Grid */
  .live-games { margin-bottom: 2rem; }
  .games-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
  }
  .game-tile {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .game-tile.live-game { border-color: var(--accent2); box-shadow: 0 0 8px rgba(224,78,57,0.3); }
  .game-tile .game-tile-status {
    text-align: center;
    margin-bottom: 0.25rem;
  }
  .game-tile .game-tile-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.2rem 0;
  }
  .game-tile .tile-team {
    font-weight: 600;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }
  .game-tile .tile-seed {
    color: var(--muted);
    font-size: 0.75rem;
    font-weight: 400;
  }
  .game-tile .tile-score {
    font-weight: 700;
    font-size: 1.05rem;
    min-width: 28px;
    text-align: right;
  }
  .game-tile .tile-team.winner { color: var(--green); }
  .game-tile .tile-team.loser { color: var(--muted); opacity: 0.6; }
  .game-tile .tile-score.winner { color: var(--green); }
  .game-tile .tile-score.loser { color: var(--muted); opacity: 0.6; }
  .game-status-badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .status-live { background: rgba(224,78,57,0.2); color: var(--accent2); }
  .status-final { background: rgba(143,173,200,0.15); color: var(--muted); }
  .status-upcoming { background: rgba(0,156,222,0.15); color: var(--accent); }
  .owner-tag {
    font-size: 0.65rem;
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    background: rgba(0,156,222,0.2);
    color: var(--accent);
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0.25rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .tab {
    padding: 0.5rem 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* Player detail */
  .team-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 0.5rem;
  }
  .team-card.eliminated { opacity: 0.5; }
  .team-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .team-card .team-name { font-weight: 600; }
  .team-card .team-status { font-size: 0.85rem; text-align: right; }
  .team-card .pts-earned { color: var(--green); font-weight: 700; }
  .team-card .eliminated-tag { color: var(--red); font-size: 0.8rem; }
  .team-card .in-progress { color: var(--accent2); font-size: 0.8rem; }
  .team-card .game-score { color: var(--muted); font-size: 0.8rem; }

  /* Game log under each team */
  .game-log {
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
  }
  .game-log-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.2rem 0;
    font-size: 0.8rem;
  }
  .log-date { color: var(--muted); min-width: 50px; }
  .log-result {
    font-weight: 700;
    min-width: 32px;
    text-align: center;
    padding: 0.1rem 0.3rem;
    border-radius: 3px;
    font-size: 0.7rem;
  }
  .log-win { background: rgba(46,204,113,0.2); color: var(--green); }
  .log-loss { background: rgba(231,76,60,0.2); color: var(--red); }
  .log-live { background: rgba(224,78,57,0.2); color: var(--accent2); }
  .log-matchup { color: var(--text); flex: 1; }
  .log-pts { font-weight: 700; min-width: 50px; text-align: right; }
  .log-pts-pos { color: var(--green); }
  .log-pts-zero { color: var(--muted); }

  .no-games { text-align: center; color: var(--muted); padding: 2rem; grid-column: 1 / -1; }
  .error-msg { text-align: center; color: var(--red); padding: 2rem; grid-column: 1 / -1; }

  @media (max-width: 900px) {
    .games-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .header h1 { font-size: 1.4rem; }
    .standings-table { font-size: 0.85rem; }
    .standings-table th, .standings-table td { padding: 0.4rem 0.5rem; }
    .games-grid { grid-template-columns: 1fr; }
    .tab { padding: 0.4rem 0.7rem; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>March Madness</span> Pool 2026</h1>
  <div class="subtitle">8 Players &bull; 64 Teams &bull; $25 Buy-in</div>
  <div class="prizes">1st: $125 &bull; 2nd: $50 &bull; 3rd: $25</div>
</div>
<div class="update-bar">
  <span class="live-dot"></span>
  Auto-updates every 30s &bull; Last updated: <span id="lastUpdate">--</span>
</div>

<div class="container">
  <div class="standings">
    <h2 class="section-title">Standings</h2>
    <table class="standings-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th>Points</th>
          <th>Teams Alive</th>
          <th>Prize</th>
        </tr>
      </thead>
      <tbody id="standingsBody"></tbody>
    </table>
  </div>

  <div class="live-games" id="liveGamesSection">
    <h2 class="section-title">Today's Games</h2>
    <div class="games-grid" id="liveGames"><div class="no-games">Loading scores...</div></div>
  </div>

  <h2 class="section-title">Team Details</h2>
  <div class="tabs" id="playerTabs"></div>
  <div id="playerDetails"></div>
</div>

<script>
// ==================== DRAFT DATA ====================
// Each team maps to its ESPN team ID for exact matching.
// Teams not in the 2025 tournament have id: null (they simply won't match any games).
const DRAFT = {

    { name: "UCLA", id: "26" },

    { name: "Furman", id: "231" }
  ],
  "Matt": [
    { name: "Purdue", id: "2509" },

  ],
  "Taylor": [

    { name: "Alabama", id: "333" },
    { name: "BYU", id: "252" },
    { name: "Kentucky", id: "96" },
    { name: "Miami (OH)", id: "193" },
    { name: "SMU", id: "2567" },
    { name: "High Point", id: "2272" },
    { name: "Queens", id: "2511" },
    { name: "UMBC", id: "2378" },
    { name: "Howard", id: "47" }
  ],
  "Noah": [
    { name: "Florida", id: "57" },
    { name: "Illinois", id: "356" },
    { name: "Louisville", id: "97" },
    { name: "Tennessee", id: "2633" },
    { name: "Texas A&M", id: "245" },
    { name: "Texas", id: "251" },
    { name: "NC State", id: "152" },
    { name: "North Dakota State", id: "2449" },
    { name: "Long Island", id: "112358" }
  ],
  "Brooke": [
    { name: "UConn", id: "41" },
    { name: "Kansas", id: "2305" },
    { name: "Miami", id: "2390" },
    { name: "TCU", id: "2628" },
    { name: "Georgia", id: "61" },
    { name: "McNeese", id: "2377" },
    { name: "Troy", id: "2653" },
    { name: "Kennesaw State", id: "338" }
  ]
};

// Build lookup: ESPN team ID -> owner name
const idToOwner = {};
// Also track which draft entry each ID maps to: ESPN team ID -> { owner, index }
const idToDraftEntry = {};
for (const [owner, teams] of Object.entries(DRAFT)) {
  teams.forEach((t, i) => {
    if (t.id) {
      idToOwner[t.id] = owner;
      idToDraftEntry[t.id] = { owner, index: i };
    }
  });
}

// Find owner by ESPN team ID (extracted from game data)
function findOwner(espnTeamId) {
  return idToOwner[espnTeamId] || null;
}

// ==================== STATE ====================
let allGames = []; // all fetched games
let playerScores = {}; // player -> { total, teamsAlive, teams: [{name, status, pts, gameInfo}] }
let activeTab = null;

// ==================== ESPN API ====================
// NCAA Men's Basketball Tournament scoreboard
const ESPN_BASE = "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard";

// Fetch scores for a given date (YYYYMMDD)
async function fetchScores(dateStr) {
  const url = `${ESPN_BASE}?dates=${dateStr}&groups=100&limit=200`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`ESPN API error: ${resp.status}`);
  const data = await resp.json();
  return data.events || [];
}

// Get tournament dates to check (current tournament window)
function getTournamentDates() {
  const dates = [];
  // 2026 NCAA Tournament: March 17 - April 6
  const start = new Date(2026, 2, 17); // March 17
  const end = new Date(2026, 3, 7);    // April 7
  const today = new Date();
  const endDate = today < end ? today : end;
  for (let d = new Date(start); d <= endDate; d.setDate(d.getDate() + 1)) {
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    dates.push(`${yyyy}${mm}${dd}`);
  }
  return dates;
}

function parseGame(event) {
  const competition = event.competitions?.[0];
  if (!competition) return null;

  const teams = competition.competitors || [];
  if (teams.length < 2) return null;

  const homeTeam = teams.find(t => t.homeAway === "home") || teams[0];
  const awayTeam = teams.find(t => t.homeAway === "away") || teams[1];

  const status = competition.status || event.status;
  const statusType = status?.type?.name || "STATUS_SCHEDULED";
  const statusDetail = status?.type?.shortDetail || status?.type?.detail || "";
  const clock = status?.displayClock || "";
  const period = status?.period || 0;

  // Detect First Four (play-in) games from notes
  const notes = (competition.notes || []).map(n => n.headline || "").join(" ");
  const isFirstFour = notes.toLowerCase().includes("first four");

  return {
    id: event.id,
    name: event.name || "",
    date: event.date,
    isFirstFour,
    home: {
      teamId: String(homeTeam.team?.id || ""),
      name: homeTeam.team?.displayName || homeTeam.team?.name || "TBD",
      shortName: homeTeam.team?.shortDisplayName || homeTeam.team?.abbreviation || "TBD",
      score: parseInt(homeTeam.score) || 0,
      seed: homeTeam.curatedRank?.current || homeTeam.statistics?.find(s => s.name === "seed")?.value || "",
      winner: homeTeam.winner || false,
    },
    away: {
      teamId: String(awayTeam.team?.id || ""),
      name: awayTeam.team?.displayName || awayTeam.team?.name || "TBD",
      shortName: awayTeam.team?.shortDisplayName || awayTeam.team?.abbreviation || "TBD",
      score: parseInt(awayTeam.score) || 0,
      seed: awayTeam.curatedRank?.current || "",
      winner: awayTeam.winner || false,
    },
    status: statusType,
    statusDetail,
    clock,
    period,
    isFinal: statusType === "STATUS_FINAL",
    isLive: statusType === "STATUS_IN_PROGRESS",
    isScheduled: statusType === "STATUS_SCHEDULED",
  };
}

// ==================== SCORING ====================
function calculateScores(games) {
  const scores = {};
  for (const owner of Object.keys(DRAFT)) {
    scores[owner] = { total: 0, teamsAlive: 0, teams: [] };
    for (const t of DRAFT[owner]) {
      scores[owner].teams.push({
        name: t.name,
        espnId: t.id,
        status: t.id ? "alive" : "not-in-tournament",
        pts: 0,
        gameInfo: null,
        gameHistory: [],  // all games this team has played
      });
    }
  }

  // For each game, match by ESPN team ID
  for (const game of games) {
    if (!game) continue;

    // Process each side of the game
    for (const side of ["home", "away"]) {
      const otherSide = side === "home" ? "away" : "home";
      const teamId = game[side].teamId;
      const entry = idToDraftEntry[teamId];
      if (!entry) continue;

      const teamEntry = scores[entry.owner].teams[entry.index];
      // A team can play multiple games in the tournament — accumulate points
      // but only update status based on most recent game
      const gameDate = new Date(game.date);
      const prevDate = teamEntry.gameInfo ? new Date(teamEntry.gameInfo.date) : null;

      // Only process if this game is newer than the previous one tracked
      if (prevDate && gameDate < prevDate) continue;

      teamEntry.gameInfo = game;
      if (game.isFinal) {
        if (game[side].winner) {
          const diff = game[side].score - game[otherSide].score;
          teamEntry.status = "won";
          // Don't overwrite — accumulate across rounds
        } else {
          teamEntry.status = "eliminated";
        }
      } else if (game.isLive) {
        teamEntry.status = "playing";
      }
    }
  }

  // Second pass: calculate points and build game history from ALL games
  // Sort games by date so history is chronological
  const sortedGames = [...games].filter(Boolean).sort((a, b) => new Date(a.date) - new Date(b.date));

  for (const game of sortedGames) {
    if (!game.isFinal && !game.isLive) continue;
    for (const side of ["home", "away"]) {
      const otherSide = side === "home" ? "away" : "home";
      const teamId = game[side].teamId;
      const entry = idToDraftEntry[teamId];
      if (!entry) continue;

      const teamEntry = scores[entry.owner].teams[entry.index];
      const won = game.isFinal ? game[side].winner : (game[side].score > game[otherSide].score);
      const diff = game[side].score - game[otherSide].score;
      const ptsEarned = (game.isFirstFour || !won) ? 0 : (game.isFinal ? diff : Math.max(0, diff));

      // Add to game history
      teamEntry.gameHistory.push({
        date: game.date,
        opponent: game[otherSide].shortName,
        opponentSeed: game[otherSide].seed,
        teamScore: game[side].score,
        oppScore: game[otherSide].score,
        won,
        ptsEarned,
        isFirstFour: game.isFirstFour,
        isLive: game.isLive,
        statusDetail: game.statusDetail,
      });

      // Add points (skip First Four)
      if (!game.isFirstFour) {
        if (game.isFinal && won) {
          teamEntry.pts += diff;
        } else if (game.isLive && diff > 0) {
          teamEntry.pts += diff;
        }
      }
    }
  }

  // Sum up totals
  for (const owner of Object.keys(scores)) {
    let total = 0;
    let alive = 0;
    for (const t of scores[owner].teams) {
      total += t.pts;
      if (t.status !== "eliminated" && t.status !== "not-in-tournament") alive++;
    }
    scores[owner].total = total;
    scores[owner].teamsAlive = alive;
  }

  return scores;
}

// ==================== RENDERING ====================
function renderStandings(scores) {
  const sorted = Object.entries(scores).sort((a, b) => b[1].total - a[1].total);
  const tbody = document.getElementById("standingsBody");
  const prizes = ["$125", "$50", "$25"];

  tbody.innerHTML = sorted.map(([name, data], i) => `
    <tr>
      <td class="rank rank-${i + 1}">${i + 1}</td>
      <td class="player-name">${name}</td>
      <td class="score">${data.total}</td>
      <td class="teams-alive">${data.teamsAlive} / ${data.teams.length}</td>
      <td class="money">${prizes[i] || ""}</td>
    </tr>
  `).join("");
}

function renderPlayerTabs(scores) {
  const tabs = document.getElementById("playerTabs");
  const sorted = Object.entries(scores).sort((a, b) => b[1].total - a[1].total);

  tabs.innerHTML = sorted.map(([name]) =>
    `<div class="tab ${activeTab === name ? 'active' : ''}" data-player="${name}">${name}</div>`
  ).join("");

  tabs.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      activeTab = activeTab === tab.dataset.player ? null : tab.dataset.player;
      renderPlayerTabs(scores);
      renderPlayerDetail(scores);
    });
  });
}

function renderPlayerDetail(scores) {
  const container = document.getElementById("playerDetails");
  if (!activeTab || !scores[activeTab]) {
    container.innerHTML = "";
    return;
  }

  const data = scores[activeTab];
  const teamsSorted = [...data.teams].sort((a, b) => b.pts - a.pts);

  container.innerHTML = teamsSorted.map(t => {
    const eliminatedClass = (t.status === "eliminated" || t.status === "not-in-tournament") ? "eliminated" : "";
    let statusHtml = "";
    let gameHtml = "";

    if (t.status === "won") {
      statusHtml = `<span class="pts-earned">+${t.pts} pts</span>`;
      if (t.gameInfo) {
        gameHtml = `<div class="game-score">${t.gameInfo.home.name} ${t.gameInfo.home.score} - ${t.gameInfo.away.score} ${t.gameInfo.away.name}</div>`;
      }
    } else if (t.status === "eliminated") {
      statusHtml = `<span class="eliminated-tag">Eliminated</span>`;
      if (t.gameInfo) {
        gameHtml = `<div class="game-score">${t.gameInfo.home.name} ${t.gameInfo.home.score} - ${t.gameInfo.away.score} ${t.gameInfo.away.name}</div>`;
      }
    } else if (t.status === "playing") {
      statusHtml = `<span class="in-progress">LIVE +${t.pts}</span>`;
      if (t.gameInfo) {
        const detail = t.gameInfo.statusDetail || `${t.gameInfo.clock} - ${t.gameInfo.period}H`;
        gameHtml = `<div class="game-score">${t.gameInfo.home.name} ${t.gameInfo.home.score} - ${t.gameInfo.away.score} ${t.gameInfo.away.name} (${detail})</div>`;
      }
    } else if (t.status === "not-in-tournament") {
      statusHtml = `<span style="color:var(--muted);font-size:0.85rem;">Not in Tournament</span>`;
    } else {
      statusHtml = `<span style="color:var(--green);font-size:0.85rem;">Active</span>`;
    }

    // Build game log rows
    let gameLogHtml = "";
    if (t.gameHistory.length > 0) {
      const rows = t.gameHistory.map(g => {
        const result = g.isLive ? "LIVE" : (g.won ? "W" : "L");
        const resultClass = g.isLive ? "log-live" : (g.won ? "log-win" : "log-loss");
        const ptsClass = g.ptsEarned > 0 ? "log-pts-pos" : "log-pts-zero";
        const ptsLabel = g.isFirstFour ? "Play-in" : (g.ptsEarned > 0 ? `+${g.ptsEarned}` : "0");
        const dateStr = new Date(g.date).toLocaleDateString([], { month: 'short', day: 'numeric' });
        const liveDetail = g.isLive ? ` (${g.statusDetail || 'LIVE'})` : "";
        return `
          <div class="game-log-row">
            <span class="log-date">${dateStr}</span>
            <span class="log-result ${resultClass}">${result}</span>
            <span class="log-matchup">${g.teamScore}-${g.oppScore} vs ${g.opponentSeed ? '(' + g.opponentSeed + ') ' : ''}${g.opponent}${liveDetail}</span>
            <span class="log-pts ${ptsClass}">${ptsLabel}</span>
          </div>`;
      }).join("");
      gameLogHtml = `<div class="game-log">${rows}</div>`;
    }

    return `
      <div class="team-card ${eliminatedClass}">
        <div class="team-card-header">
          <span class="team-name">${t.name}</span>
          <div class="team-status">
            ${statusHtml}
          </div>
        </div>
        ${gameLogHtml}
      </div>
    `;
  }).join("");
}

function renderLiveGames(games) {
  const container = document.getElementById("liveGames");

  // Show today's games and any live games
  const now = new Date();
  const todayStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;

  const todaysGames = games.filter(g => {
    if (!g) return false;
    const gDate = new Date(g.date);
    const gStr = `${gDate.getFullYear()}${String(gDate.getMonth()+1).padStart(2,'0')}${String(gDate.getDate()).padStart(2,'0')}`;
    return gStr === todayStr || g.isLive;
  });

  // If no today's games, show most recent completed games
  const displayGames = todaysGames.length > 0 ? todaysGames :
    games.filter(g => g && g.isFinal).slice(-10);

  if (displayGames.length === 0) {
    container.innerHTML = '<div class="no-games">No games today. Check back on game day!</div>';
    return;
  }

  // Sort: live first, then upcoming, then final
  displayGames.sort((a, b) => {
    const order = { playing: 0, live: 0, scheduled: 1, final: 2 };
    const aO = a.isLive ? 0 : a.isScheduled ? 1 : 2;
    const bO = b.isLive ? 0 : b.isScheduled ? 1 : 2;
    return aO - bO;
  });

  container.innerHTML = displayGames.map(g => {
    let statusBadge = "";
    if (g.isLive) {
      statusBadge = `<span class="game-status-badge status-live">${g.statusDetail || 'LIVE'}</span>`;
    } else if (g.isFinal) {
      statusBadge = `<span class="game-status-badge status-final">Final</span>`;
    } else {
      const gameTime = new Date(g.date).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      statusBadge = `<span class="game-status-badge status-upcoming">${gameTime}</span>`;
    }

    const homeOwner = findOwner(g.home.teamId);
    const awayOwner = findOwner(g.away.teamId);
    const homeOwnerTag = homeOwner ? `<span class="owner-tag">${homeOwner}</span>` : "";
    const awayOwnerTag = awayOwner ? `<span class="owner-tag">${awayOwner}</span>` : "";

    const homeClass = g.isFinal ? (g.home.winner ? "winner" : "loser") : "";
    const awayClass = g.isFinal ? (g.away.winner ? "winner" : "loser") : "";

    const showScores = g.isLive || g.isFinal;
    const tileClass = g.isLive ? "game-tile live-game" : "game-tile";

    return `
      <div class="${tileClass}">
        <div class="game-tile-status">${statusBadge}</div>
        <div class="game-tile-row">
          <div class="tile-team ${awayClass}">
            <span class="tile-seed">${g.away.seed || ''}</span>
            ${g.away.shortName}
            ${awayOwnerTag}
          </div>
          ${showScores ? `<div class="tile-score ${awayClass}">${g.away.score}</div>` : ""}
        </div>
        <div class="game-tile-row">
          <div class="tile-team ${homeClass}">
            <span class="tile-seed">${g.home.seed || ''}</span>
            ${g.home.shortName}
            ${homeOwnerTag}
          </div>
          ${showScores ? `<div class="tile-score ${homeClass}">${g.home.score}</div>` : ""}
        </div>
      </div>
    `;
  }).join("");
}

// ==================== MAIN ====================
async function loadAllScores() {
  const dates = getTournamentDates();
  const allEvents = [];

  // Fetch all dates in parallel (batch of 5)
  for (let i = 0; i < dates.length; i += 5) {
    const batch = dates.slice(i, i + 5);
    const results = await Promise.all(batch.map(d => fetchScores(d).catch(() => [])));
    for (const events of results) {
      allEvents.push(...events);
    }
  }

  // Deduplicate by event ID
  const seen = new Set();
  const unique = [];
  for (const e of allEvents) {
    if (!seen.has(e.id)) {
      seen.add(e.id);
      unique.push(e);
    }
  }

  return unique.map(parseGame).filter(Boolean);
}

async function refresh() {
  try {
    allGames = await loadAllScores();
    playerScores = calculateScores(allGames);

    renderStandings(playerScores);
    renderPlayerTabs(playerScores);
    renderPlayerDetail(playerScores);
    renderLiveGames(allGames);

    document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
  } catch (err) {
    console.error("Refresh error:", err);
    document.getElementById("liveGames").innerHTML =
      `<div class="error-msg">Error loading scores. Will retry in 30s. (${err.message})</div>`;
  }
}

// Initial load + auto-refresh
refresh();
setInterval(refresh, 30000);
</script>
